<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <style>
        .elemento{
            display: inline;
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
            width: 200px;
            height: 200px;
        }

        .resaltado{
            color: bisque;
            letter-spacing: 2px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: large;
            font-weight: bold;
        }

        .elemento_block{
            display: block;
            background-color: #023;
            color: rgb(228, 62, 62);
            width: 200px; 
            height: 200px;
           
        }
    
    </style>
</head>   
<>


    <h1>inline:</h1>

    <div class="elemento resaltado">
        Productos
    </div>
     <div class="elemento">
        Servicio
    </div>
    <div class="elemento">
        Nosotros
    </div>
    <div class="elemento">
        Contacto
    </div>

    <hr/>

    <h1>Block:</h1>
    <div class="elemento_block">
        Productos
    </div>
     <div class="elemento_block">
        Servicio
    </div>
    <div class="elemento_block">
        Nosotros
    </div>
    <div class="elemento_block">
        Contacto
    </div>

</body>
</html>
