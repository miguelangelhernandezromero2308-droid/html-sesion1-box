<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

    <h1>inline:</h1>

   <div class="inline bg-rose-100">
        Productos
    </div>
     <div class="inline bg-rose-200">
        Servicio
    </div>
    <div class="inline bg-rose-300">
        Nosotros
    </div>
    <div class="inline bg-rose-400">
        Contacto
    </div>

    <hr/>

    <h1>Block:</h1>
    <div class="block text-purple-800 bg-purple-200 w-[200px] h-[200px]">
        Productos
    </div>
    <div class="block text-purple-600 bg-purple-400 w-[200px] h-[200px]">
        Servicio
    </div>
    <div class="block text-purple-400 bg-purple-600 w-[200px] h-[200px]">
        Nosotros
    </div>
    <div class="block text-purple-200 bg-purple-800 w-[200px] h-[200px]">
        Contacto
    </div>

</body>
</html>
